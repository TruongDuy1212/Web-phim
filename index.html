<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic - Rạp Phim Trực Tuyến</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS Popup Form Đăng nhập/Đăng ký đẹp mắt, không làm lệch giao diện cũ */
        .auth-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .auth-box {
            background: #18181b;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 360px;
            border: 1px solid #27272a;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-family: Arial, sans-serif;
        }
        .auth-close-btn {
            position: absolute;
            top: 15px; right: 15px;
            color: #a1a1aa; cursor: pointer; font-size: 18px;
        }
        .auth-box h3 {
            margin-top: 0; color: #fff; font-size: 22px;
            text-align: center; margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block; color: #a1a1aa; font-size: 11px; margin-bottom: 5px; font-weight: bold;
        }
        .form-group input {
            width: 100%; padding: 10px; background: #09090b;
            border: 1px solid #27272a; color: #fff; border-radius: 4px;
            box-sizing: border-box; outline: none;
        }
        .form-group input:focus { border-color: #e50914; }
        .submit-btn {
            width: 100%; padding: 12px; background: #e50914;
            color: #fff; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; font-size: 14px;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #dc2626; }
        .switch-mode-text {
            color: #a1a1aa; text-align: center; font-size: 13px; margin-top: 20px; margin-bottom: 0;
        }
        .switch-mode-text span {
            color: #fbbf24; cursor: pointer; text-decoration: underline;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Cinematic</div>
        <nav class="nav-links">
            <a href="index.html" class="active">Trang Chủ</a>
            <a href="#">Phim Bộ</a>
            <a href="#">Phim Lẻ</a>
            <a href="#">Hoạt Hình</a>
            <a href="#">Quốc Gia</a>
        </nav>
        <div class="search-profile-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm tên phim...">
                <button onclick="handleSearch()">🔍</button>
            </div>
            
            <div class="user-profile">
                <div class="avatar">?</div>
                <div class="user-info">
                    <span class="username">Đăng nhập</span>
                    <span class="usertype">Khách qua đường</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="movie-section" id="searchResultSection" style="display: none;">
            <h2 class="section-title" style="color: #ffcc00;">Kết Quả Tìm Kiếm</h2>
            <div class="movie-grid" id="searchMoviesGrid"></div>
        </section>

        <section class="movie-section">
            <h2 class="section-title">Phim Mới Cập Nhật</h2>
            <div class="movie-grid" id="newMoviesGrid"></div>
        </section>

        <section class="movie-section">
            <h2 class="section-title">Phim Trung Quốc</h2>
            <div class="movie-grid" id="phimTrungQuocGrid"></div>
        </section>

        <section class="movie-section">
            <h2 class="section-title">Phim Hàn Quốc</h2>
            <div class="movie-grid" id="phimHanQuocGrid"></div>
        </section>

        <section class="movie-section">
            <h2 class="section-title">Phim Kinh Dị</h2>
            <div class="movie-grid" id="horrorMovieGrid"></div>
        </section>
        
        <section class="movie-section">
            <h2 class="section-title">Phim Bộ</h2>
            <div class="movie-grid" id="phimBoGrid"></div>
        </section>
        
        <section class="movie-section">
            <h2 class="section-title">Phim Lẻ</h2>
            <div class="movie-grid" id="phimLeGrid"></div>
        </section>
        
        <section class="movie-section">
            <h2 class="section-title">Anime</h2>
            <div class="movie-grid" id="animeGrid"></div>
        </section>
    </main>

    <div class="auth-overlay" id="authModal">
        <div class="auth-box">
            <span class="auth-close-btn" onclick="closeAuthModal()">✕</span>
            <h3 id="authTitle">Đăng Nhập Hệ Thống</h3>
            
            <div class="form-group">
                <label>TÊN TÀI KHOẢN</label>
                <input type="text" id="authUser" placeholder="Nhập tài khoản của bạn...">
            </div>
            <div class="form-group">
                <label>MẬT KHẨU</label>
                <input type="password" id="authPass" placeholder="Nhập mật khẩu...">
            </div>
            
            <button class="submit-btn" id="authSubmitBtn" onclick="submitAuthForm()">ĐĂNG NHẬP</button>
            
            <p class="switch-mode-text" id="authSwitchText">
                Chưa có tài khoản? <span onclick="openAuthModal('register')">Đăng ký thành viên</span>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
