<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic - Rạp Phim Trực Tuyến</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">Cinematic</div>
        <nav class="nav-links">
            <a href="index.html" class="active">Trang Chủ</a>
            <a href="#">Phim Bộ</a>
            <a href="#">Phim Lẻ</a>
            <a href="#">Hoạt Hình</a>
            <a href="#">Quốc Gia</a>
        </nav>
        
        <div class="search-profile-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm tên phim...">
                <button onclick="handleSearch()">🔍</button>
            </div>
            
            <div class="user-profile">
                <div class="avatar">?</div>
                <div class="user-info">
                    <span class="username">Đăng nhập</span>
                    <span class="usertype">Khách qua đường</span>
                </div>
            </div>
        </div>
    </header>

    <section class="hero-banner" id="heroBanner">
        <div class="hero-content">
            <span class="hero-badge">PHIM HOT NỔI BẬT</span>
            <h1 id="heroTitle">Đang tải siêu phẩm...</h1>
            <p id="heroDesc">Hệ thống đang kết nối dữ liệu rạp phim Cinematic VIP...</p>
            <div class="hero-buttons">
                <button class="btn-hero-vip play" id="heroPlayBtn">▶ XEM NGAY</button>
            </div>
        </div>
    </section>

    <main class="main-content">
        <section class="movie-section" id="searchResultSection" style="display: none;">
            <h2 class="section-title" style="color: #ffcc00;">Kết Quả Tìm Kiếm</h2>
            <div class="movie-grid" id="searchMoviesGrid"></div>
        </section>

        <section class="movie-section">
            <h2 class="section-title">Phim Mới Cập Nhật</h2>
            <div class="movie-grid" id="newMoviesGrid"></div>
        </section>

        <section class="movie-section">
            <h2 class="section-title">Phim Trung Quốc</h2>
            <div class="movie-grid" id="phimTrungQuocGrid"></div>
        </section>

        <section class="movie-section">
            <h2 class="section-title">Phim Hàn Quốc</h2>
            <div class="movie-grid" id="phimHanQuocGrid"></div>
        </section>

        <section class="movie-section">
            <h2 class="section-title">Phim Kinh Dị</h2>
            <div class="movie-grid" id="horrorMovieGrid"></div>
        </section>
        
        <section class="movie-section">
            <h2 class="section-title">Phim Bộ</h2>
            <div class="movie-grid" id="phimBoGrid"></div>
        </section>
        
        <section class="movie-section">
            <h2 class="section-title">Phim Lẻ</h2>
            <div class="movie-grid" id="phimLeGrid"></div>
        </section>
        
        <section class="movie-section">
            <h2 class="section-title">Anime</h2>
            <div class="movie-grid" id="animeGrid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
