<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine NC - Rạp Phim Trực Tuyến</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="header" style="display: flex; align-items: center; justify-content: space-between; padding: 15px 4%; background: #060606; border-bottom: 1px solid #111;">
        
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="logo-group" onclick="window.location.href='index.html'" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <div style="background: #e50914; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 14px; box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);">▶</div>
                <span style="color: #fff; font-weight: 900; font-size: 22px; font-family: sans-serif;">Cine <span style="color: #e50914; background: rgba(229,9,20,0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(229,9,20,0.2);">NC</span></span>
            </div>

            <div class="search-box" style="position: relative; width: 260px;">
                <span style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #666; font-size: 14px;">🔍</span>
                <input type="text" id="searchInput" placeholder="Tìm kiếm phim..." style="width: 100%; padding: 8px 15px 8px 40px; background: #141416; border: 1px solid #222; color: #fff; border-radius: 20px; font-size: 13px; outline: none;">
            </div>
        </div>

        <nav class="nav-links" style="display: flex; align-items: center; gap: 20px;">
            <a href="index.html" class="nav-btn active" style="display: flex; align-items: center; gap: 6px; color: #fff; text-decoration: none; font-size: 13px; font-weight: bold; padding: 6px 16px; background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 20px;"><span style="color: #e50914;">🧭</span> Khám phá</a>
            <a href="#" class="nav-btn" style="display: flex; align-items: center; gap: 6px; color: #aaa; text-decoration: none; font-size: 13px; font-weight: bold;"><span style="color: #888;">⏳</span> Bộ lọc</a>
            <a href="#" class="nav-btn" style="display: flex; align-items: center; gap: 6px; color: #aaa; text-decoration: none; font-size: 13px; font-weight: bold;"><span style="color: #888;">🤍</span> Yêu thích</a>
            <a href="#" class="nav-btn" style="display: flex; align-items: center; gap: 6px; color: #aaa; text-decoration: none; font-size: 13px; font-weight: bold;"><span style="color: #888;">🕒</span> Lịch sử xem</a>
        </nav>
        
        <div class="search-profile-container">
            <div class="user-profile" style="background: rgba(229,9,20,0.08); border: 1px solid rgba(229,9,20,0.2); padding: 6px 14px; border-radius: 20px; display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <div class="avatar" style="background: #e50914; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 12px;">S</div>
                <div class="user-info" style="display: flex; flex-direction: column;">
                    <span class="username" style="color: #fff; font-size: 12px; font-weight: bold;">Đăng nhập</span>
                    <span class="usertype" style="color: rgba(255,255,255,0.4); font-size: 10px;">Cá nhân</span>
                </div>
            </div>
        </div>
    </header>

    <section class="hero-banner" id="heroBanner" style="position: relative; height: 520px; margin: 20px 4%; border-radius: 16px; overflow: hidden; background-size: cover; background-position: center; display: flex; align-items: center;">
        
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.9) 30%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.1) 100%); z-index: 1;"></div>

        <div class="hero-content" style="position: relative; z-index: 2; max-width: 650px; padding-left: 5%;">
            <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
                <span style="background: #e50914; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">PHIM ĐANG CHIẾU</span>
                <span style="background: #333; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">HD</span>
                <span style="background: #333; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;">Vietsub + Thuyết Minh</span>
            </div>
            
            <h1 id="heroTitle" style="font-size: 42px; font-weight: bold; color: #fff; margin: 0 0 15px 0; line-height: 1.2;">Tên Phim</h1>
            <p id="heroDesc" style="color: #ccc; font-size: 14px; line-height: 1.6; margin-bottom: 30px;">Mô tả nội dung phim bom tấn cực kỳ hấp dẫn...</p>
            
            <div style="display: flex; gap: 15px;">
                <button class="btn-hero-vip play" id="heroPlayBtn" style="background: #e50914; color: #fff; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;">▶ Xem Ngay</button>
                <button style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 12px 30px; border-radius: 25px; font-weight: bold; font-size: 14px; cursor: pointer;">+ Thêm Vào Tủ</button>
            </div>
        </div>

        <button onclick="changeHeroSlide(-1)" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 3;">❮</button>
        <button onclick="changeHeroSlide(1)" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 3;">❯</button>
    </section>

    <main class="main-content" style="padding: 0 4%;">
        <section class="movie-section" id="searchResultSection" style="display: none;">
            <h2 class="section-title" style="color: #ffcc00;">Kết Quả Tìm Kiếm</h2>
            <div class="movie-grid" id="searchMoviesGrid"></div>
        </section>

        <section class="movie-section"><h2 class="section-title">Phim Mới Cập Nhật</h2><div class="movie-grid" id="newMoviesGrid"></div></section>
        <section class="movie-section"><h2 class="section-title">Phim Trung Quốc</h2><div class="movie-grid" id="phimTrungQuocGrid"></div></section>
        <section class="movie-section"><h2 class="section-title">Phim Hàn Quốc</h2><div class="movie-grid" id="phimHanQuocGrid"></div></section>
        <section class="movie-section"><h2 class="section-title">Phim Kinh Dị</h2><div class="movie-grid" id="horrorMovieGrid"></div></section>
        <section class="movie-section"><h2 class="section-title">Phim Bộ</h2><div class="movie-grid" id="phimBoGrid"></div></section>
        <section class="movie-section"><h2 class="section-title">Phim Lẻ</h2><div class="movie-grid" id="phimLeGrid"></div></section>
        <section class="movie-section"><h2 class="section-title">Anime</h2><div class="movie-grid" id="animeGrid"></div></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
